input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/postgresql-42.7.10.jar"
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://postgres:5432/product_service"
    jdbc_user => "postgres"
    jdbc_password => "postgres"

    schedule => "*/1 * * * *"

    statement => "SELECT * FROM products WHERE updated_at > :sql_last_value ORDER BY updated_at ASC"

    use_column_value => true
    tracking_column => "updated_at"
    tracking_column_type => "timestamp"

    last_run_metadata_path => "/usr/share/logstash/data/last_run_products_metadata"
  }
}

filter {
  mutate {
    add_field => { "name_suggest" => "%{name}" }
  }
}

output {
  stdout {
    codec => rubydebug
  }
}

output {
    elasticsearch {
        hosts => ["es:9200"]
        index => "products"
        action => "index"
        document_id => "%{id}"
        template => "/usr/share/logstash/template.json"
        template_name => "products_template"
        template_overwrite => true
    }
}
