services:

  postgres:
    image: postgres:18
    container_name: postgres
    ports:
      - 5433:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product_service
    command: postgres -c wal_level=logical
    volumes:
      - ./pgdata:/var/lib/postgresql/
    networks:
      - product-net

  kafka:
    image: quay.io/debezium/kafka:3.5
    container_name: kafka
    ports:
      - 9092:9092
      - 9093:9093
      - 9094:9094
    environment:
      - CLUSTER_ID=oh-sxaDRTcyAr6pFRbXyzA
      - NODE_ID=1
      - NODE_ROLE=combined
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - product-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - 8080:8080
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - product-net

  kafka-connect:
    image: quay.io/debezium/connect:3.5
    container_name: kafka-connect
    ports:
     - 8083:8083
    depends_on:
     - kafka
     - postgres
    environment:
     - BOOTSTRAP_SERVERS=kafka:9092
     - GROUP_ID=1
     - CONFIG_STORAGE_TOPIC=my_connect_configs
     - OFFSET_STORAGE_TOPIC=my_connect_offsets
     - STATUS_STORAGE_TOPIC=my_connect_statuses
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - product-net

  connect-init:
    image: curlimages/curl:latest
    container_name: connect-init
    volumes:
      - ./debezium/product-connector-config.json:/product-connector-config.json
      - ./debezium/product-outbox-connector-config.json:/product-outbox-connector-config.json
      - ./debezium/init-connectors.sh:/init-connectors.sh
    depends_on:
      kafka-connect:
        condition: service_healthy
    command: sh /init-connectors.sh
    restart: on-failure
    networks:
      - product-net

  redis:
    image: redis:8.6
    ports:
      - "6379:6379"

