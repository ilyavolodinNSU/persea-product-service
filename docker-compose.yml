services:
  postgres:
    image: postgres:18
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product_service
    volumes:
      - ./pgdata:/var/lib/postgresql/
    networks:
      - elk-net
  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: es
    environment:
      - discovery.type=single-node
      - node.name=es01a
      - xpack.security.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - elk-net
  kib:
    image: docker.elastic.co/kibana/kibana:9.3.2
    container_name: kib
    ports:
      - 5601:5601
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200
    depends_on:
      - es
    networks:
      - elk-net
  ls:
    image: docker.elastic.co/logstash/logstash:9.3.2
    container_name: ls
    ports:
      - 5044:5044
    depends_on:
      - postgres
      - es
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/
      - ./lsdata:/usr/share/logstash/data
      - ./logstash/postgresql-42.7.10.jar:/usr/share/logstash/postgresql-42.7.10.jar
    networks:
      - elk-net
networks:
  elk-net: